<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Percorso chiuso · Andrea Cerioli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Serif:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#1B6D3F;
  --verde-scuro:#0F4A29;
  --petrolio:#0E5260;
  --petrolio-chiaro:#2A7E8A;
  --acqua:#7DD3A6;
  --acqua-chiaro:#9DEFC0;
  --avorio:#F5E6CC;
  --crema:#EAF1F2;
  --carta:#FFFFFF;
  --inchiostro:#1A1A1A;
  --grigio:#6B6B6B;
  --grigio-chiaro:#D6DEDF;
  --ambra:#B8860B;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  background:var(--crema);
  color:var(--inchiostro);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.cartolina{
  width:100%;
  max-width:760px;
  background:var(--carta);
  border:1px solid var(--grigio-chiaro);
  border-radius:12px;
  padding:0;
  position:relative;
  box-shadow:0 1px 0 rgba(0,0,0,.02), 0 12px 40px -12px rgba(27,109,63,.18);
  overflow:hidden;
}
.cartolina::before{
  content:"";
  display:none;
}
.banner-wrapper{
  position:relative;
  margin:0;
  padding:0;
  line-height:0;
}
.banner{
  width:100%;
  display:block;
  border-bottom:1px solid var(--grigio-chiaro);
}
.banner-titolo{
  position:absolute;
  top:18px;
  left:32px;
  margin:0;
  padding:0;
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  font-weight:600;
  letter-spacing:-.01em;
  line-height:1.05;
  color:var(--verde-scuro);
  text-shadow:0 1px 2px rgba(255,255,255,0.45);
}
.banner-titolo__riga1{
  display:block;
  font-size:30px;
}
.banner-titolo__riga2{
  display:block;
  font-size:22px;
  font-weight:500;
  margin-top:2px;
}
.contenuto{
  padding:14px 36px 12px;
}

.eyebrow{
  font-size:11px;
  font-weight:500;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--verde);
  margin-bottom:10px;
}
.titolo{
  margin-bottom:8px;
}
/* Manifesto: pull quote del messaggio pedagogico */
.manifesto{
  margin:0 0 14px;
  padding:12px 18px 10px;
  background:var(--crema);
  border-left:3px solid var(--verde);
  border-radius:0 4px 4px 0;
  position:relative;
}
.manifesto__eyebrow{
  font-size:10px;
  font-weight:500;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--verde);
  margin-bottom:10px;
}
.manifesto__quote{
  font-family:'IBM Plex Serif',Georgia,serif;
  font-size:15px;
  line-height:1.45;
  color:var(--inchiostro);
  margin:0;
  font-style:italic;
  letter-spacing:-.005em;
}
.manifesto__quote-evidenza{
  display:block;
  margin-top:6px;
  color:var(--verde-scuro);
  font-weight:500;
  font-style:normal;
}
.manifesto__attribuzione{
  margin-top:8px;
  font-size:11px;
  letter-spacing:.06em;
  color:var(--grigio);
  font-style:normal;
}

.footer{
  background:var(--crema);
  padding:14px 36px 12px;
  text-align:center;
}
.footer__info{
  font-size:13px;
  color:var(--grigio);
  letter-spacing:.01em;
}
.footer__info strong{
  font-family:'IBM Plex Serif',Georgia,serif;
  font-weight:500;
  color:var(--verde-scuro);
  font-size:14px;
}
.footer__bullet{
  margin:0 6px;
  color:var(--grigio-chiaro);
}
.footer__firma{
  margin-top:6px;
  font-size:10px;
  letter-spacing:.04em;
  color:var(--grigio);
}
.footer__firma strong{
  color:var(--verde-scuro);
  font-weight:500;
}

.titolo__secondario{
  display:block;
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  font-weight:400;
  font-size:15px;
  line-height:1.4;
  color:var(--grigio);
  margin-top:8px;
  letter-spacing:0;
}
.conteggio{
  text-align:center;
  margin-top:12px;
}
.conteggio__label{
  font-size:10px;
  font-weight:500;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--grigio);
  margin-bottom:3px;
}
.conteggio__valore{
  font-family:'IBM Plex Serif',Georgia,serif;
  font-size:18px;
  font-weight:500;
  color:var(--verde-scuro);
  line-height:1.2;
}

.scena-mondi{
  margin:0;
  padding:0;
}
.scena-card{
  padding:22px 0 16px;
  background:#0E5260;
  background:linear-gradient(180deg, #0E5260 0%, #133A44 100%);
  border-top:1px solid var(--grigio-chiaro);
}
.scena-card svg{
  display:block;
  margin:0 auto;
  max-width:calc(100% - 48px);
}
.scena-mondi svg{
  width:100%;
  height:auto;
  display:block;
  max-height:180px;
}

.firma-autore{
  text-align:center;
  margin-top:18px;
  font-size:11px;
  letter-spacing:.06em;
  color:var(--grigio);
  font-family:'IBM Plex Sans',system-ui,sans-serif;
}
.firma-autore strong{
  color:var(--verde-scuro);
  font-weight:500;
}

@media (max-width:640px){
  .contenuto{padding:14px 20px 10px;}
  .banner-titolo{top:12px;left:18px}
  .banner-titolo__riga1{font-size:22px}
  .banner-titolo__riga2{font-size:16px}
  .titolo__secondario{font-size:14px}
  .footer{padding:14px 24px;font-size:12px;gap:10px}
  .scena-card{padding:18px 20px 14px}
  .scena-mondi svg{max-height:180px}
  .manifesto{padding:14px 16px 12px}
  .manifesto__quote{font-size:15px}
}

@keyframes scorriMatrix {
  0%   { transform: translateX(-180px); }
  100% { transform: translateX(0); }
}
.matrix-row {
  animation: scorriMatrix linear infinite;
}
.matrix-r1 { animation-duration: 4.2s; animation-delay: 0s; }
.matrix-r2 { animation-duration: 3.8s; animation-delay: 0.6s; }
.matrix-r3 { animation-duration: 5.1s; animation-delay: 1.1s; }
.matrix-r4 { animation-duration: 4.5s; animation-delay: 0.3s; }
.matrix-r5 { animation-duration: 3.6s; animation-delay: 1.4s; }
.matrix-r6 { animation-duration: 4.8s; animation-delay: 0.8s; }
</style>
</head>

</div>
<script>
(function(){

  const GIORNI_SCUOLA = ['Mon','Tue','Wed','Thu','Fri'];

  function partsRome(date){
    return new Intl.DateTimeFormat('en-US', {
      timeZone: 'Europe/Rome',
      year:'numeric', month:'2-digit', day:'2-digit',
      weekday:'short', hour:'2-digit', minute:'2-digit',
      hour12:false,
    }).formatToParts(date);
  }

  function getRomeOffsetHours(date){
    const tzPart = new Intl.DateTimeFormat('en-US', {
      timeZone:'Europe/Rome', timeZoneName:'longOffset'
    }).formatToParts(date).find(p => p.type === 'timeZoneName').value;
    const m = tzPart.match(/GMT([+-])(\d{2}):(\d{2})/);
    if (!m) return 1;
    return (m[1] === '+' ? 1 : -1) * (parseInt(m[2],10) + parseInt(m[3],10)/60);
  }

  function dateInRome(y, m, d, h, mi){
    const ipotesi = new Date(Date.UTC(y, m - 1, d, h, mi));
    const offset = getRomeOffsetHours(ipotesi);
    return new Date(Date.UTC(y, m - 1, d, h - offset, mi));
  }

  function isEstate(parts){
    const month = parseInt(parts.find(p => p.type === 'month').value, 10);
    const day = parseInt(parts.find(p => p.type === 'day').value, 10);
    return (month === 6 && day >= 5) ||
           month === 7 ||
           month === 8 ||
           (month === 9 && day <= 13);
  }

  function calcolaChiusura(now){
    const parts = partsRome(now);
    const year = parseInt(parts.find(p => p.type === 'year').value, 10);
    const month = parseInt(parts.find(p => p.type === 'month').value, 10);
    const day = parseInt(parts.find(p => p.type === 'day').value, 10);
    const weekday = parts.find(p => p.type === 'weekday').value;
    const hour = parseInt(parts.find(p => p.type === 'hour').value, 10);

    if (isEstate(parts)) {
      return {
        inizio: dateInRome(year, 6, 5, 0, 0),
        fine: dateInRome(year, 9, 14, 8, 0),
        tipo: 'estate'
      };
    }

    const isGiornoScuola = GIORNI_SCUOLA.includes(weekday);
    const isOraScuola = hour >= 8 && hour < 16;

    if (isGiornoScuola && isOraScuola) return null;

    let inizio = null;
    if (isGiornoScuola && hour >= 16) {
      inizio = dateInRome(year, month, day, 16, 0);
    } else {
      let probe = new Date(now);
      for (let i = 0; i < 10 && !inizio; i++) {
        probe = new Date(probe.getTime() - 86400000);
        const p = partsRome(probe);
        const wd = p.find(x => x.type === 'weekday').value;
        if (GIORNI_SCUOLA.includes(wd)) {
          const py = parseInt(p.find(x => x.type === 'year').value, 10);
          const pm = parseInt(p.find(x => x.type === 'month').value, 10);
          const pd = parseInt(p.find(x => x.type === 'day').value, 10);
          const cand = dateInRome(py, pm, pd, 16, 0);
          if (cand <= now) inizio = cand;
        }
      }
    }

    let fine = null;
    if (isGiornoScuola && hour < 8) {
      fine = dateInRome(year, month, day, 8, 0);
    } else {
      let probe = new Date(now);
      for (let i = 0; i < 10 && !fine; i++) {
        probe = new Date(probe.getTime() + 86400000);
        const p = partsRome(probe);
        const wd = p.find(x => x.type === 'weekday').value;
        if (GIORNI_SCUOLA.includes(wd)) {
          const py = parseInt(p.find(x => x.type === 'year').value, 10);
          const pm = parseInt(p.find(x => x.type === 'month').value, 10);
          const pd = parseInt(p.find(x => x.type === 'day').value, 10);
          const cand = dateInRome(py, pm, pd, 8, 0);
          if (cand > now) fine = cand;
        }
      }
    }

    return { inizio, fine, tipo: 'giornaliera' };
  }

  function fmtTempo(ms){
    if (ms <= 0) return 'a momenti';
    const giorni = Math.floor(ms / 86400000);
    const ore = Math.floor((ms % 86400000) / 3600000);
    const min = Math.floor((ms % 3600000) / 60000);
    if (giorni >= 7) return giorni + ' giorni';
    if (giorni > 0) {
      return giorni + (giorni === 1 ? ' giorno' : ' giorni') +
             (ore ? ' e ' + ore + 'h' : '');
    }
    if (ore > 0) {
      return ore + (ore === 1 ? ' ora' : ' ore') +
             (min ? ' e ' + min + 'm' : '');
    }
    return min + (min === 1 ? ' minuto' : ' minuti');
  }

  (function impostaContenuto(){
    const parts = partsRome(new Date());
    if (isEstate(parts)) {
      document.getElementById('titoloSecondario').textContent =
        'riprende il 14 settembre';
    }
  })();

  const conto = document.getElementById('conto');

  function tick(){
    const now = new Date();
    const c = calcolaChiusura(now);

    if (!c) {
      conto.textContent = 'aperto ora';
      setTimeout(tick, 60000);
      return;
    }

    conto.textContent = fmtTempo(c.fine - now);
    setTimeout(tick, 30000);
  }
  tick();

})();
</script>
