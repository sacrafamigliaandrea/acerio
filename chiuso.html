<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Portale chiuso · Andrea Cerioli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Serif:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#1B6D3F;
  --verde-scuro:#0F4A29;
  --petrolio:#0E5260;
  --petrolio-chiaro:#2A7E8A;
  --acqua:#7DD3A6;
  --avorio:#F5E6CC;
  --crema:#FAF8F3;
  --carta:#FFFFFF;
  --inchiostro:#1A1A1A;
  --grigio:#6B6B6B;
  --grigio-chiaro:#E5E2DA;
  --ambra:#B8860B;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  background:var(--crema);
  color:var(--inchiostro);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
  -webkit-font-smoothing:antialiased;
}
.cartolina{
  width:100%;
  max-width:780px;
  background:var(--carta);
  border:1px solid var(--grigio-chiaro);
  border-radius:4px;
  padding:44px 48px 40px;
  position:relative;
  display:grid;
  grid-template-columns:1fr 240px;
  gap:48px;
  align-items:start;
  box-shadow:0 1px 0 rgba(0,0,0,.02), 0 12px 40px -12px rgba(27,109,63,.18);
}
.cartolina::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;height:6px;
  background:var(--verde);
  border-radius:4px 4px 0 0;
}

.autore{
  display:flex;
  align-items:center;
  gap:14px;
  padding-bottom:20px;
  margin-bottom:24px;
  border-bottom:1px solid var(--grigio-chiaro);
}
.autore__logo{
  width:56px;
  height:56px;
  object-fit:cover;
  flex-shrink:0;
  filter:drop-shadow(0 3px 8px rgba(27,109,63,.18));
}
.autore__testo{min-width:0}
.autore__nome{
  font-family:'IBM Plex Serif',Georgia,serif;
  font-size:18px;
  font-weight:500;
  color:var(--verde-scuro);
  line-height:1.2;
  letter-spacing:-.01em;
}
.autore__ruolo{
  font-size:12px;
  color:var(--grigio);
  margin-top:2px;
  letter-spacing:.02em;
}

.eyebrow{
  font-size:11px;
  font-weight:500;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--verde);
  margin-bottom:12px;
}
h1{
  font-family:'IBM Plex Serif',Georgia,serif;
  font-weight:500;
  font-size:26px;
  line-height:1.2;
  color:var(--verde-scuro);
  margin-bottom:12px;
  letter-spacing:-.01em;
}
.intro{
  font-size:15px;
  line-height:1.55;
  color:var(--grigio);
  margin-bottom:24px;
}
.calendario{
  background:var(--crema);
  border-left:3px solid var(--verde);
  padding:18px 22px;
}
.calendario__voce{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  font-size:14px;
  padding:6px 0;
}
.calendario__voce + .calendario__voce{
  border-top:1px dashed var(--grigio-chiaro);
  margin-top:6px;
  padding-top:12px;
}
.calendario__chiave{color:var(--inchiostro);font-weight:500}
.calendario__valore{
  font-variant-numeric:tabular-nums;
  color:var(--verde-scuro);
  font-weight:500;
}
.calendario__voce--estate.attiva{
  background:rgba(184,134,11,.08);
  margin:6px -8px 0;
  padding:12px 8px 6px;
  border-radius:3px;
  border-top:none !important;
}
.calendario__voce--estate.attiva .calendario__chiave{color:var(--ambra)}
.calendario__voce--estate.attiva .calendario__valore{color:var(--ambra)}

.col-orologio{
  display:flex;
  align-items:center;
  justify-content:center;
  align-self:stretch;
}
.col-orologio svg{
  width:220px;
  height:220px;
  display:block;
}

@media (max-width:640px){
  .cartolina{
    grid-template-columns:1fr;
    gap:24px;
    padding:32px 24px 28px;
  }
  .col-orologio{order:-1}
  .col-orologio svg{width:160px;height:160px}
  h1{font-size:22px}
  .intro{font-size:14px}
}
</style>
</head>
<body>
<main class="cartolina" role="main">

  <div class="col-info">

    <header class="autore">
      <img src="aclogo.gif" class="autore__logo" alt="Logo Andrea Cerioli">
      <div class="autore__testo">
        <div class="autore__nome">Andrea Cerioli</div>
        <div class="autore__ruolo">Animatore Digitale · Sacra Famiglia</div>
      </div>
    </header>

    <div class="eyebrow" id="ey">Avviso</div>

    <h1 id="titolo">Il portale è disponibile<br>in orario scolastico</h1>

    <p class="intro" id="intro">
      Per favorire un uso consapevole degli strumenti digitali, l'accesso
      alle risorse è attivo solo durante le ore di lezione.
    </p>

    <section class="calendario" aria-label="Calendario di apertura">
      <div class="calendario__voce">
        <span class="calendario__chiave">Lunedì – Venerdì</span>
        <span class="calendario__valore">8:00 – 16:00</span>
      </div>
      <div class="calendario__voce calendario__voce--estate" id="voceEstate">
        <span class="calendario__chiave">Chiusura estiva</span>
        <span class="calendario__valore">5 giu – 13 set</span>
      </div>
    </section>

  </div>

  <div class="col-orologio">
    <svg viewBox="0 0 200 200" role="img" aria-label="Orologio analogico Europe/Rome">
      <circle cx="100" cy="100" r="96" fill="none" stroke="#2A7E8A" stroke-width="1" opacity="0.35"/>
      <circle cx="100" cy="100" r="90" fill="#0E5260"/>
      <circle cx="100" cy="100" r="90" fill="none" stroke="#2A7E8A" stroke-width="1.5"/>

      <g stroke="#F5E6CC" stroke-linecap="round">
        <line x1="100" y1="14" x2="100" y2="24" stroke-width="2.5" transform="rotate(0 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(30 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(60 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="24" stroke-width="2.5" transform="rotate(90 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(120 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(150 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="24" stroke-width="2.5" transform="rotate(180 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(210 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(240 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="24" stroke-width="2.5" transform="rotate(270 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(300 100 100)"/>
        <line x1="100" y1="14" x2="100" y2="20" stroke-width="1" opacity="0.5" transform="rotate(330 100 100)"/>
      </g>

      <rect id="hH" x="97" y="56" width="6" height="48" rx="2" fill="#F5E6CC" transform="rotate(0 100 100)"/>
      <rect id="hM" x="98.5" y="36" width="3" height="68" rx="1.5" fill="#F5E6CC" transform="rotate(0 100 100)"/>
      <g id="hS" transform="rotate(0 100 100)">
        <line x1="100" y1="22" x2="100" y2="115" stroke="#7DD3A6" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="100" cy="115" r="2.5" fill="#7DD3A6"/>
      </g>

      <circle cx="100" cy="100" r="5" fill="#F5E6CC"/>
      <circle cx="100" cy="100" r="2" fill="#0E5260"/>
    </svg>
  </div>

</main>

<script>
(function(){

  function partsOra(){
    return new Intl.DateTimeFormat('en-US', {
      timeZone: 'Europe/Rome',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false,
    }).formatToParts(new Date());
  }

  function isEstate(parts){
    const month = parseInt(parts.find(p => p.type === 'month').value, 10);
    const day = parseInt(parts.find(p => p.type === 'day').value, 10);
    return (month === 6 && day >= 5) ||
           month === 7 ||
           month === 8 ||
           (month === 9 && day <= 13);
  }

  (function impostaContenuto(){
    const parts = partsOra();
    if (isEstate(parts)) {
      document.getElementById('ey').textContent = 'Chiusura estiva';
      document.getElementById('titolo').innerHTML = 'Il portale<br>riapre il 14 settembre';
      document.getElementById('intro').textContent =
        'Buone vacanze. Le risorse digitali tornano disponibili al rientro a scuola.';
      document.getElementById('voceEstate').classList.add('attiva');
    }
  })();

  function aggiornaOrologio(){
    const parts = partsOra();
    const h  = parseInt(parts.find(p => p.type === 'hour').value, 10);
    const m  = parseInt(parts.find(p => p.type === 'minute').value, 10);
    const s  = parseInt(parts.find(p => p.type === 'second').value, 10);
    const ms = new Date().getMilliseconds();

    const sFrac = s + ms / 1000;
    const mFrac = m + sFrac / 60;
    const hFrac = (h % 12) + mFrac / 60;

    document.getElementById('hH').setAttribute('transform', 'rotate(' + (hFrac * 30) + ' 100 100)');
    document.getElementById('hM').setAttribute('transform', 'rotate(' + (mFrac * 6)  + ' 100 100)');
    document.getElementById('hS').setAttribute('transform', 'rotate(' + (sFrac * 6)  + ' 100 100)');

    requestAnimationFrame(aggiornaOrologio);
  }
  aggiornaOrologio();

})();
</script>
</body>
</html>
